name: DwarfStar
options:
  bundleIdPrefix: com.dwarfstar
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Apple Silicon ONLY. The engine requires unified-memory Metal and uses
    # Float16 (unavailable on macOS x86_64): building the Intel slice fails
    # with misleading errors ("Float16 has no member bitPattern"). Pin arm64
    # so "Any Mac" destinations and Archive never try x86_64.
    ARCHS: arm64
    EXCLUDED_ARCHS: x86_64
    ONLY_ACTIVE_ARCH: YES
    # Pure-Swift modules have no Obj-C interop, so no -Swift.h is generated;
    # disable the "Copy Swift Obj-C Interface Header" install phase (it would
    # otherwise fail looking for a missing header).
    SWIFT_INSTALL_OBJC_HEADER: "NO"

# Pure-Swift DeepSeek-V4 stack — NO external links (no C engine, no prebuilt
# static lib). The SwiftUI app (DwarfStar) is now driven by the Swift engine
# (DS4Engine -> DS4Core + DS4Metal), so the whole thing builds in this .xcodeproj.
targets:
  DS4Core:
    type: library.static
    platform: macOS
    sources:
      - Sources/DS4Core

  DS4Metal:
    type: library.static
    platform: macOS
    sources:
      - Sources/DS4Metal
    dependencies:
      - target: DS4Core
      - sdk: Metal.framework

  DS4Engine:
    type: library.static
    platform: macOS
    sources:
      - Sources/DS4Engine
    dependencies:
      - target: DS4Core
      - target: DS4Metal
      - sdk: Metal.framework

  DS4Demo:
    type: tool
    platform: macOS
    sources:
      - Sources/DS4Demo
    dependencies:
      - target: DS4Core
      - target: DS4Metal
      - sdk: Metal.framework

  DwarfStar:
    type: application
    platform: macOS
    sources:
      - Sources/DwarfStar
    dependencies:
      - target: DS4Engine
      - target: DS4Core
      - target: DS4Metal
      - sdk: Metal.framework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.dwarfstar.app
        INFOPLIST_KEY_CFBundleDisplayName: DwarfStar
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        # Export compliance: the app uses only EXEMPT encryption (HTTPS/TLS via
        # the OS for downloads) + SHA-1 hashing (not encryption). No proprietary
        # crypto. See docs/CRITTOGRAFIA.md. NO = no annual self-classification report.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # Local-network privacy (macOS 15+): without this usage description the
        # system can silently deny LAN traffic — distributed inference (worker/
        # coordinator on LAN Macs) and the HTTP server would fail. macOS shows a
        # one-time consent prompt with this text.
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "DwarfStar usa la rete locale per l'inferenza distribuita (coordinatore e worker sui Mac della LAN) e per esporre il server HTTP locale."
        MARKETING_VERSION: "1.0"
        # Build number: `make xcodeproj` increments this in-place before xcodegen.
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        CODE_SIGN_STYLE: Automatic
        # Signing team (set once here: the .xcodeproj is REGENERATED by
        # `make xcodeproj`, so a team chosen in the Xcode UI would be lost).
        DEVELOPMENT_TEAM: U4V89TP978
        ENABLE_HARDENED_RUNTIME: YES
        # Wire the manually-added AppIcon + entitlements so `make xcodeproj`
        # regenerates losslessly. The Assets.xcassets catalog under
        # Sources/DwarfStar is auto-detected by xcodegen.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: packaging/DwarfStar.entitlements
