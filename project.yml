# XcodeGen project specification.
#
# Generates `DeepSeekV4Pro.xcodeproj` from this declarative spec so
# the repo doesn't have to commit the fragile pbxproj format. The
# generated .xcodeproj is gitignored; this file is the source of
# truth.
#
# One-time setup:
#     brew install xcodegen
#
# Each time this file or the source layout changes:
#     xcodegen generate
#     # or:
#     ./Tools/generate-xcodeproj.sh
#
# After generation:
#     open DeepSeekV4Pro.xcodeproj
#     # → select scheme "DeepSeekUI" → ⌘R
#
# The SPM Package.swift still works as before — `swift run DeepSeekUI`
# / `swift test` / `swift build` are unchanged. The Xcode project is
# an alternative entry point that produces a proper .app bundle with
# codesign, an Info.plist in Contents/, dock icon, and the usual Mac
# app affordances.

name: DeepSeekV4Pro

options:
  bundleIdPrefix: com.deepseek.v4pro
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug

packages:
  # The local Swift Package contains DeepSeekKit + the MetalLibPlugin
  # build tool that compiles .metal kernels. The Xcode App target
  # below depends only on the DeepSeekKit library product; the kernel
  # build phase runs transparently when Xcode resolves the package.
  DeepSeekKit:
    path: .

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Be explicit about platform so Xcode's destination resolver
    # never falls back to "no eligible run destination".
    SDKROOT: macosx
    SUPPORTED_PLATFORMS: macosx
    ARCHS: "$(ARCHS_STANDARD)"
    # Local dev: ad-hoc signing only. Gatekeeper on macOS 14+
    # silently refuses to launch *unsigned* binaries; ad-hoc ("-")
    # is the lightest signing identity that satisfies it. Hardened
    # runtime stays OFF because it requires a real Developer ID
    # team — incompatible with ad-hoc.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  # NOTE: this target is named "DeepSeekApp" — *not* "DeepSeekUI" —
  # to avoid a scheme-name collision with the SPM executable target
  # (also named "DeepSeekUI") that the workspace exposes via
  # Package.swift. With both visible in the workspace, Xcode would
  # otherwise show two "DeepSeekUI" schemes: the SPM one (an
  # executable, no "My Mac" destination, what triggered the user's
  # "no destination" error) and this app one. Renaming this target
  # disambiguates the scheme picker. PRODUCT_NAME below stays
  # "DeepSeekUI" so the produced .app + binary still match the
  # Info.plist.
  DeepSeekApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/DeepSeekUI
        # The Info.plist is referenced via INFOPLIST_FILE below;
        # exclude it from the Compile Sources phase so Xcode doesn't
        # try to treat it as a Swift file or duplicate-copy it.
        excludes:
          - "Resources/Info.plist"
    dependencies:
      - package: DeepSeekKit
        product: DeepSeekKit
      # ConvertSheet.swift / ConvertViewModel.swift import this for
      # `Converter.runQuantize` and the TargetDType enum. The SPM
      # DeepSeekUI target already depends on it; the Xcode project
      # has to declare it explicitly because XcodeGen doesn't mirror
      # SPM target deps automatically.
      - package: DeepSeekKit
        product: DeepSeekConverter
      # Fine-tuning scaffold (Spec + Progress + Runner + public entry
      # point). FineTuneSheet.swift / FineTuneViewModel.swift import
      # this for `FineTuner.run` and the FineTuneSpec / dtype enums.
      - package: DeepSeekKit
        product: DeepSeekTraining
      # Native tool runtime (read/write/edit/grep/glob/shell/...).
      # Same xcodegen-vs-SPM caveat — declare explicitly.
      - package: DeepSeekKit
        product: DeepSeekTools
      - package: DeepSeekKit
        product: DeepSeekIntegrations
    settings:
      base:
        INFOPLIST_FILE: Sources/DeepSeekUI/Resources/Info.plist
        # XcodeGen would otherwise auto-generate a stub Info.plist
        # and conflict with the one we ship.
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.deepseek.v4pro.ui
        # PRODUCT_NAME drives both the .app folder name and the
        # binary inside Contents/MacOS/. We pin it to "DeepSeekUI"
        # so it matches the Info.plist `CFBundleExecutable` and the
        # SPM executable name — no Intents / Shortcuts registration
        # mismatch. The user-facing display name lives in the
        # Info.plist's CFBundleDisplayName = "DeepSeek-V4" which is
        # independent of the binary name.
        PRODUCT_NAME: DeepSeekUI
        # The UI is a SwiftUI macOS app, not a sandboxed App Store
        # build. NSOpenPanel needs filesystem access to /Volumes/...
        # for the model directory.
        ENABLE_APP_SANDBOX: NO
        # Asset catalog hook — empty for now; future: add an
        # Assets.xcassets with an AppIcon set under Sources/DeepSeekUI/Resources.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
