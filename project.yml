name: DwarfStar
options:
  bundleIdPrefix: com.dwarfstar
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Pure-Swift modules have no Obj-C interop, so no -Swift.h is generated;
    # disable the "Copy Swift Obj-C Interface Header" install phase (it would
    # otherwise fail looking for a missing header).
    SWIFT_INSTALL_OBJC_HEADER: "NO"

# Pure-Swift DeepSeek-V4 stack — NO external links (no C engine, no prebuilt
# static lib). The SwiftUI app (DwarfStar) is now driven by the Swift engine
# (DS4Engine -> DS4Core + DS4Metal), so the whole thing builds in this .xcodeproj.
targets:
  DS4Core:
    type: library.static
    platform: macOS
    sources:
      - Sources/DS4Core

  DS4Metal:
    type: library.static
    platform: macOS
    sources:
      - Sources/DS4Metal
    dependencies:
      - target: DS4Core
      - sdk: Metal.framework

  DS4Engine:
    type: library.static
    platform: macOS
    sources:
      - Sources/DS4Engine
    dependencies:
      - target: DS4Core
      - target: DS4Metal
      - sdk: Metal.framework

  DS4Demo:
    type: tool
    platform: macOS
    sources:
      - Sources/DS4Demo
    dependencies:
      - target: DS4Core
      - target: DS4Metal
      - sdk: Metal.framework

  DwarfStar:
    type: application
    platform: macOS
    sources:
      - Sources/DwarfStar
    dependencies:
      - target: DS4Engine
      - target: DS4Core
      - target: DS4Metal
      - sdk: Metal.framework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.dwarfstar.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
