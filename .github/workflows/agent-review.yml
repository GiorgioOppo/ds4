# PR review job that runs the agent against the diff. Scaffolded —
# the actual command line is a placeholder because the headless
# server / CLI subcommand that drives `InferenceService` outside the
# GUI doesn't exist yet (tracked in TODO.md → "server mode").
#
# Once that lands, replace the placeholder step with something like:
#   ./.build/release/deepseek-agent review \
#       --base ${{ github.event.pull_request.base.sha }} \
#       --head ${{ github.event.pull_request.head.sha }} \
#       --post-comment
#
# The job stays in the repo as a template so reviewers can see where
# the integration will plug in.
name: agent-review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: macos-14
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diff stats
        run: |
          git fetch --no-tags --no-recurse-submodules origin \
            "${{ github.event.pull_request.base.ref }}"
          git diff --stat "origin/${{ github.event.pull_request.base.ref }}...HEAD"

      - name: Agent review (placeholder)
        run: |
          echo "TODO: invoke deepseek-agent once headless mode ships."
          echo "See TODO.md → 'server mode'."
